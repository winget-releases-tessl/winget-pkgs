# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.9.0.schema.json
PackageIdentifier: tessl.tessl
PackageVersion: 0.81.2
InstallerType: inno
Scope: user
UpgradeBehavior: install
Commands:
  - tessl
# Inno's standard silent flags. /SUPPRESSMSGBOXES suppresses any prompt the
# script might raise, /NORESTART prevents automatic post-install reboots.
InstallerSwitches:
  Silent: /VERYSILENT /NORESTART /SUPPRESSMSGBOXES
  SilentWithProgress: /SILENT /NORESTART /SUPPRESSMSGBOXES
# Inno Setup ARP key is "{AppId}_is1" — ProductCode must match the AppId GUID in
# installer/windows/tessl.iss. Do not change without changing both.
AppsAndFeaturesEntries:
  - DisplayName: Tessl CLI
    DisplayVersion: 0.81.2
    Publisher: Tessl
    ProductCode: '{B8E7F4D2-9A1C-4E5B-8F3D-2C6A9E4B7F1D}_is1'
    InstallerType: inno
Installers:
  # Canonical Tessl-hosted release assets. The pipeline uploads to these exact
  # paths in _release.yml ("Upload Windows installer to S3"). Both arches are
  # built by the installer-windows matrix; submit-winget passes both URLs to
  # `wingetcreate update --urls`.
  - Architecture: x64
    InstallerUrl: https://install.tessl.io/installers-windows/0.81.2/TesslSetup-0.81.2-x64.exe
    InstallerSha256: 5010E2DB2DF697859BA45C94888029DD4F35685939455EFFDBBC11808A9F9CE5
  - Architecture: arm64
    InstallerUrl: https://install.tessl.io/installers-windows/0.81.2/TesslSetup-0.81.2-arm64.exe
    InstallerSha256: 7ACC174B0D1FA0691128150FC98A26A3FDC6463FA80096B8152A2C36981478E3
ManifestType: installer
ManifestVersion: 1.9.0
